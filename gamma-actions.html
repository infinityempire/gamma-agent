<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamma Agent v2.0 - GitHub Actions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header {
            text-align: center;
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 2px solid #00d4ff;
        }
        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .token-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .token-section input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #00d4ff;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .token-section button {
            padding: 10px 30px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            color: #0f0c29;
            font-weight: bold;
            cursor: pointer;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
        }
        .panel-title {
            color: #00d4ff;
            font-size: 1.3em;
            margin-bottom: 15px;
        }
        
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #00d4ff;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-family: monospace;
            resize: vertical;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            color: #0f0c29;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:disabled { background: #555; cursor: not-allowed; }
        
        .steps-display {
            max-height: 500px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
        }
        .step {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-right: 4px solid #555;
            background: rgba(255,255,255,0.03);
            animation: fadeIn 0.3s ease;
        }
        .step.active { border-right-color: #00d4ff; background: rgba(0,212,255,0.1); }
        .step.done { border-right-color: #00ff88; }
        .step-icon { font-size: 1.5em; margin-right: 10px; }
        .step-title { font-weight: bold; margin-bottom: 5px; }
        .step-details {
            font-family: monospace;
            font-size: 0.85em;
            color: #aaa;
            direction: ltr;
            text-align: left;
            white-space: pre-wrap;
        }
        
        .output-section {
            margin-top: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #00ff88;
        }
        #final-output {
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 10px;
            font-family: monospace;
            color: #00ff88;
            direction: ltr;
            text-align: left;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            transition: width 0.5s ease;
        }
        
        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .connection-status.connected { background: rgba(0,255,136,0.2); color: #00ff88; }
        .connection-status.disconnected { background: rgba(255,68,68,0.2); color: #ff4444; }
        .pulse { width: 10px; height: 10px; border-radius: 50%; animation: pulse 1.5s infinite; }
        .pulse.green { background: #00ff88; }
        .pulse.red { background: #ff4444; }
        
        .run-info {
            background: rgba(0,212,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }
        .run-info a { color: #00d4ff; }
    </style>
</head>
<body>
    <div class="connection-status connected" id="connection-status">
        <span class="pulse green"></span>
        <span>GitHub Actions Ready</span>
    </div>
    
    <div class="container">
        <header>
            <h1>🚀 GAMMA AGENT v2.0</h1>
            <p>Powered by GitHub Actions</p>
        </header>
        
        <div class="token-section">
            <input type="password" id="github-token" placeholder="🔑 GitHub Token (ghp_...)" value="">
            <button onclick="saveToken()">💾 Save</button>
            <span id="token-saved" style="color: #00ff88; display: none;"> ✓ Saved!</span>
        </div>
        
        <div class="main-grid">
            <div class="panel">
                <div class="panel-title">📝 Task</div>
                <textarea id="task-input">Gamma, list all your active autonomous services, and output the current status of each one to empire_report.txt.</textarea>
                <button class="btn" id="execute-btn" onclick="executeViaActions()">
                    🚀 Run on GitHub Actions
                </button>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                </div>
                
                <div class="run-info" id="run-info" style="display: none;">
                    <div>📦 Run ID: <span id="run-id">-</span></div>
                    <div>🔗 <a id="run-link" href="#" target="_blank">View on GitHub</a></div>
                    <div>Status: <span id="run-status">-</span></div>
                    <button onclick="checkStatus()" style="margin-top: 10px;">🔄 Check Status</button>
                </div>
            </div>
            
            <div class="panel">
                <div class="panel-title">📋 Execution Steps</div>
                <div class="steps-display" id="steps-display">
                    <div style="text-align: center; color: #666; padding: 40px;">
                        Steps will appear here...
                    </div>
                </div>
            </div>
        </div>
        
        <div class="output-section">
            <div class="panel-title">📤 Output</div>
            <div id="final-output">Output will appear here...</div>
        </div>
    </div>
    
    <script>
        let githubToken = localStorage.getItem('gh_token') || '';
        let currentRunId = null;
        
        if (githubToken) {
            document.getElementById('github-token').value = githubToken;
        }
        
        function saveToken() {
            githubToken = document.getElementById('github-token').value.trim();
            if (githubToken) {
                localStorage.setItem('gh_token', githubToken);
                document.getElementById('token-saved').style.display = 'inline';
                setTimeout(() => document.getElementById('token-saved').style.display = 'none', 2000);
            }
        }
        
        async function githubApi(endpoint, method = 'GET', body = null) {
            const response = await fetch(`https://api.github.com${endpoint}`, {
                method,
                headers: {
                    'Authorization': `token ${githubToken}`,
                    'Accept': 'application/vnd.github+json'
                },
                body: body ? JSON.stringify(body) : null
            });
            return response;
        }
        
        async function getRepoInfo() {
            // Get repo from current page or use default
            const response = await githubApi('/repos/infinityempire/gamma-agent');
            return response.json();
        }
        
        function addStep(icon, title, details) {
            const container = document.getElementById('steps-display');
            const stepEl = document.createElement('div');
            stepEl.className = 'step active';
            stepEl.innerHTML = `
                <div style="display: flex; align-items: center;">
                    <span class="step-icon">${icon}</span>
                    <div style="flex: 1;">
                        <div class="step-title">${title}</div>
                        <div class="step-details">${details || 'Processing...'}</div>
                    </div>
                </div>
            `;
            container.insertBefore(stepEl, container.firstChild);
        }
        
        function updateProgress(percent) {
            document.getElementById('progress-fill').style.width = percent + '%';
        }
        
        function showOutput(output) {
            document.getElementById('final-output').textContent = output;
        }
        
        async function executeViaActions() {
            if (!githubToken) {
                alert('Please enter GitHub token');
                return;
            }
            
            const task = document.getElementById('task-input').value.trim();
            if (!task) {
                alert('Please enter a task');
                return;
            }
            
            const btn = document.getElementById('execute-btn');
            btn.disabled = true;
            btn.textContent = '🚀 Triggering...';
            
            // Reset UI
            document.getElementById('steps-display').innerHTML = '';
            document.getElementById('final-output').textContent = 'Triggering workflow...';
            document.getElementById('run-info').style.display = 'none';
            
            try {
                const repo = await getRepoInfo();
                if (!repo.full_name) throw new Error('Repository not found');
                
                // STEP 1: Trigger workflow
                addStep('🧠', 'Triggering Workflow', 'Creating workflow dispatch...');
                updateProgress(10);
                
                const response = await githubApi(
                    `/repos/${repo.full_name}/actions/workflows/292402962/dispatches`,
                    'POST',
                    {
                        ref: 'master',
                        inputs: {
                            task: { value: task },
                            github_token: { value: githubToken }
                        }
                    }
                );
                
                if (response.status === 204) {
                    updateProgress(30);
                    addStep('✅', 'Workflow Triggered', 'GitHub Actions started...');
                    
                    // Show run info
                    document.getElementById('run-info').style.display = 'block';
                    document.getElementById('run-status').textContent = 'Running...';
                    document.getElementById('run-link').href = `https://github.com/${repo.full_name}/actions`;
                    
                    // STEP 2: Poll for completion
                    addStep('⏳', 'Waiting for Execution', 'Polling GitHub Actions...');
                    updateProgress(50);
                    
                    let completed = false;
                    let attempts = 0;
                    
                    while (!completed && attempts < 30) {
                        await new Promise(r => setTimeout(r, 2000));
                        
                        const runsResponse = await githubApi(`/repos/${repo.full_name}/actions/runs?per_page=1`);
                        const runsData = await runsResponse.json();
                        
                        if (runsData.workflow_runs && runsData.workflow_runs.length > 0) {
                            const latestRun = runsData.workflow_runs[0];
                            document.getElementById('run-id').textContent = latestRun.id;
                            document.getElementById('run-link').href = latestRun.html_url;
                            document.getElementById('run-status').textContent = latestRun.status;
                            
                            if (latestRun.status === 'completed') {
                                completed = true;
                                
                                if (latestRun.conclusion === 'success') {
                                    addStep('✅', 'Workflow Completed', `Conclusion: ${latestRun.conclusion}`);
                                    updateProgress(80);
                                    
                                    // STEP 3: Get output
                                    addStep('📥', 'Fetching Output', 'Reading empire_report.txt...');
                                    
                                    const fileResponse = await githubApi(
                                        `/repos/${repo.full_name}/contents/empire_report.txt`
                                    );
                                    const fileData = await fileResponse.json();
                                    
                                    if (fileData.content) {
                                        const content = atob(fileData.content);
                                        addStep('✅', 'Report Retrieved', `Size: ${content.length} bytes`);
                                        showOutput(content);
                                        updateProgress(100);
                                    } else {
                                        addStep('⚠️', 'Report Not Found', 'empire_report.txt not found');
                                    }
                                } else {
                                    addStep('❌', 'Workflow Failed', `Conclusion: ${latestRun.conclusion}`);
                                }
                            }
                        }
                        
                        attempts++;
                    }
                    
                    if (!completed) {
                        addStep('⏱️', 'Timeout', 'Max polling attempts reached');
                    }
                    
                } else {
                    const error = await response.json();
                    throw new Error(error.message || 'Failed to trigger workflow');
                }
                
            } catch (error) {
                alert('Error: ' + error.message);
                addStep('❌', 'Error', error.message);
            }
            
            btn.disabled = false;
            btn.textContent = '🚀 Run on GitHub Actions';
        }
        
        async function checkStatus() {
            if (!githubToken) return;
            
            try {
                const repo = await getRepoInfo();
                const runsResponse = await githubApi(`/repos/${repo.full_name}/actions/runs?per_page=1`);
                const runsData = await runsResponse.json();
                
                if (runsData.workflow_runs && runsData.workflow_runs.length > 0) {
                    const latestRun = runsData.workflow_runs[0];
                    document.getElementById('run-id').textContent = latestRun.id;
                    document.getElementById('run-link').href = latestRun.html_url;
                    document.getElementById('run-status').textContent = 
                        `${latestRun.status} (${latestRun.conclusion || 'in progress'})`;
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
    </script>
</body>
</html>
