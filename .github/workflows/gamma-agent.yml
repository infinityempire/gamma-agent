name: Gamma Agent Execution

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to execute'
        required: true
        default: 'List all active services'

permissions:
  contents: write
  actions: write

jobs:
  setup:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.define-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - id: define-matrix
        run: |
          # Generate unique run ID
          RUN_ID=$(date +%s)
          echo "matrix={\"run_id\":\"$RUN_ID\"}" >> $GITHUB_OUTPUT

  execute:
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flask flask-cors

      - name: Run Gamma Agent Server
        run: |
          # Run server in background
          python3 gamma_server.py &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          echo $SERVER_PID > /tmp/server.pid
          
          # Wait for server to start
          sleep 3
          
          # Get task from workflow input or use default
          TASK="${{ github.event.inputs.task }}"
          if [ -z "$TASK" ]; then
            TASK="List all active services"
          fi
          
          echo "📋 Executing Task: $TASK"
          
          # Execute task
          curl -s -X POST http://localhost:5000/execute \
            -H "Content-Type: application/json" \
            -d "{\"task\": \"$TASK\"}"
          
          # Wait for execution to complete
          sleep 10
          
          # Get status
          echo "📊 Server Status:"
          curl -s http://localhost:5000/status
          
          # Read and display report
          echo ""
          echo "📄 Generated Report:"
          cat empire_report.txt
          
          # Commit report if it was created
          if [ -f empire_report.txt ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add empire_report.txt
            git commit -m "🤖 Gamma Agent: Update report - $(date)" || echo "No changes to commit"
            git push || echo "Could not push changes"
          fi
          
          # Cleanup
          kill $SERVER_PID 2>/dev/null || true

      - name: Display Results
        if: always()
        run: |
          echo "✅ Gamma Agent execution completed"
          echo "Report location: empire_report.txt"
          cat empire_report.txt 2>/dev/null || echo "No report generated"