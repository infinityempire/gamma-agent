name: Gamma Agent - Cloud Execution

on:
  push:
    # Run when anything is pushed to commands/ folder
    paths:
      - 'commands/**'

  workflow_dispatch:
    inputs:
      task:
        description: 'Task for Gamma Agent'
        required: true
        default: 'Who are the prime ministers of Israel?'

  schedule:
    # Run every hour - free tier has 2000 minutes/month
    - cron: '0 * * * *'

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask flask-cors

      - name: Check for commands
        id: check_commands
        run: |
          echo "📁 Checking commands/ folder..."
          
          # Create folders if they don't exist
          mkdir -p commands archive
          
          # Check if there are command files
          if ls commands/*.txt 1> /dev/null 2>&1; then
            echo "✅ Found commands to process!"
            for file in commands/*.txt; do
              echo "📋 Task: $(basename "$file")"
              cat "$file"
            done
          else
            echo "📭 No commands found. Use workflow_dispatch to send a task."
            echo "❌ No tasks to process" >> $GITHUB_OUTPUT
          fi

      - name: Run Gamma Agent
        if: steps.check_commands.outputs.conclusion != 'skipped'
        run: |
          echo "=========================================="
          echo "🤖 GAMMA AGENT v3.0 - CLOUD EXECUTION"
          echo "=========================================="
          
          # Get task from commands folder or from input
          TASK=""
          if ls commands/*.txt 1> /dev/null 2>&1; then
            # Get the first command file
            TASK=$(cat commands/*.txt | head -1)
          else
            TASK="${{ github.event.inputs.task }}"
          fi
          
          echo "📋 Task: $TASK"
          echo "⏰ Started: $(date)"
          echo ""
          
          # Run the agent with the task
          python3 -c "
import sys
sys.path.insert(0, '.')
from gamma_server import execute_task_streaming, answer_question

task = '''$TASK'''
print('🚀 Executing task...')
print('')

# Answer the question
result = answer_question(task)
print(result)
print('')
print('='*50)
print('✅ Task completed at:', end=' ')
import datetime
print(datetime.datetime.now())
"
          
      - name: Archive completed commands
        run: |
          # Create archive folder
          mkdir -p archive
          
          # Move completed command files to archive
          if ls commands/*.txt 1> /dev/null 2>&1; then
            for file in commands/*.txt; do
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              mv "$file" "archive/$(basename "$file" .txt)_${TIMESTAMP}.txt"
              echo "📦 Archived: $(basename "$file")"
            done
          fi
          
          # List remaining commands
          echo ""
          echo "📁 Remaining commands: $(ls commands/*.txt 2>/dev/null | wc -l)"

      - name: Commit changes
        run: |
          git config --local user.email "gamma-agent[bot]@users.noreply.github.com"
          git config --local user.name "Gamma Agent"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Gamma Agent: $(date)"
          git push || echo "Nothing to commit"