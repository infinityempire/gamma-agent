name: Gamma Agent - Cloud Execution

on:
  push:
    paths:
      - 'commands/**'

  workflow_dispatch:
    inputs:
      task:
        description: 'Task to execute'
        required: true
        default: 'echo Hello'
      max_retries:
        description: 'Maximum number of retries'
        required: false
        default: '3'
      max_iterations:
        description: 'Maximum number of iterations'
        required: false
        default: '10'

  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask flask-cors

      - name: Check for commands
        id: check_commands
        run: |
          echo "📁 Checking commands/ folder..."
          mkdir -p commands archive
          
          if ls commands/*.txt 1> /dev/null 2>&1; then
            echo "✅ Found commands to process!"
            for file in commands/*.txt; do
              echo "📋 Task: $(basename "$file")"
              cat "$file"
            done
          else
            echo "📭 No commands found. Using workflow_dispatch input."
          fi

      - name: Run Gamma Agent
        run: |
          echo "=========================================="
          echo "🤖 GAMMA AGENT v3.0 - CLOUD EXECUTION"
          echo "=========================================="
          echo "📋 Task: ${{ github.event.inputs.task }}"
          echo "🔄 Max Retries: ${{ github.event.inputs.max_retries }}"
          echo "🔁 Max Iterations: ${{ github.event.inputs.max_iterations }}"
          echo "⏰ Started: $(date)"
          echo ""
          python3 run_agent.py
          
      - name: Archive completed commands
        run: |
          mkdir -p archive
          
          if ls commands/*.txt 1> /dev/null 2>&1; then
            for file in commands/*.txt; do
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              mv "$file" "archive/$(basename "$file" .txt)_${TIMESTAMP}.txt"
              echo "📦 Archived: $(basename "$file")"
            done
          fi
          
          echo "📁 Remaining commands: $(ls commands/*.txt 2>/dev/null | wc -l)"

      - name: Commit changes
        run: |
          git config --local user.email "gamma-agent[bot]@users.noreply.github.com"
          git config --local user.name "Gamma Agent"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Gamma Agent: $(date)"
          git push || echo "Nothing to commit"