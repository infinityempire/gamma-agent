name: Gamma Agent - Cloud Execution

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task for Gamma Agent'
        required: true
        default: 'Who are the prime ministers of Israel?'
      github_token:
        description: 'GitHub Token (use ${{ secrets.GITHUB_TOKEN }})'
        required: false
        default: ''

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask flask-cors

      - name: Run Gamma Agent
        run: |
          echo "=========================================="
          echo "🤖 GAMMA AGENT v3.0 - CLOUD EXECUTION"
          echo "=========================================="
          echo "📋 Task: ${{ github.event.inputs.task }}"
          echo "⏰ Started: $(date)"
          echo ""
          
          # Run the agent with the task
          python3 -c "
import sys
sys.path.insert(0, '.')
from gamma_server import execute_task_streaming, answer_question

task = '''${{ github.event.inputs.task }}'''
print('🚀 Executing task...')
print('')

# Answer the question
result = answer_question(task)
print(result)
print('')
print('='*50)
print('✅ Task completed at:', end=' ')
import datetime
print(datetime.datetime.now())
"
          
      - name: Commit report
        run: |
          git config --local user.email "gamma-agent[bot]@users.noreply.github.com"
          git config --local user.name "Gamma Agent"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Gamma Agent: ${{ github.event.inputs.task }}"
          git push || echo "Nothing to commit"