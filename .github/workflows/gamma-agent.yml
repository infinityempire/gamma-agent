name: Gamma Agent Execution

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to execute'
        required: true
        default: 'List all active services'
      github_token:
        description: 'GitHub Token'
        required: false

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Python script
        run: |
          python3 -c 'import os, time; from datetime import datetime; repo_owner = os.environ.get("REPO_OWNER", ""); repo_name = os.environ.get("REPO_NAME", ""); task = os.environ.get("TASK", ""); print("GAMMA AGENT v2.0"); print("Repository: " + repo_owner + "/" + repo_name); print("Task: " + task); services = ["Planning Engine", "Execution Core", "Git Integration", "API Gateway", "Security Monitor", "SSE Stream", "File Manager", "CORS Handler"]; print("Found " + str(len(services)) + " services"); [print("  - " + s) for s in services]; ts = datetime.now().strftime("%Y-%m-%d %H:%M:%S"); report = "GAMMA AGENT v2.0\nGenerated: " + ts + "\nRepository: " + repo_owner + "/" + repo_name + "\nTask: " + task + "\nServices: " + str(len(services)) + "\n\n" + "\n".join([str(i+1) + ". " + s for i,s in enumerate(services)]); open("empire_report.txt", "w").write(report); print("Report saved (" + str(len(report)) + " bytes)")'
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          TASK: ${{ github.event.inputs.task }}